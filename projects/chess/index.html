<html>

<head>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <canvas id="maincanvas" width="400" height="400"></canvas>

    <script>
        //elements
        const canvas = document.getElementById("maincanvas");
        const ctx = canvas.getContext("2d");
        //assets
        const king = new Image();
        king.crossOrigin = "anonymous"; 
        king.src = "https://s6.imgcdn.dev/Y9KTR8.png";
        //variables
        let scale = 30;
        let xoffset = 0;
        let yoffset = 0;
        let xmoving = 0;
        let ymoving = -6;
        //colors
        mintgreen = "#40C03B";
        forestgreen = "#20B03B";
        darkgreen = "#106A28";
        chesswhite = "#F4F0DD";
        chessyellow = "#F2F058";
        function updatemoving() {
            if (xmoving > 0) {
                xmoving -= 1/60;
                xoffset -= 1/60;
            }
            if (xmoving < 0) {
                xmoving += 1/60;
                xoffset += 1/60;
            }
            if (ymoving > 0) {
                ymoving -= 1/60;
                yoffset -= 1/60;
            }
            if (ymoving < 0) {
                ymoving += 1/60;
                yoffset += 1/60;
            }
            if (Math.round(xoffset*10)/10 == -2 || Math.round(xoffset*10)/10 == 2) {
                xoffset = 0
            }
            if (Math.round(yoffset*10)/10 == -2 || Math.round(yoffset*10)/10 == 2) {
                yoffset = 0
            }
            if (Math.round(xmoving*10)/10 === 0) {
                xoffset = Math.round(xoffset)
            }
            if (Math.round(ymoving*10)/10 === 0) {
                yoffset = Math.round(yoffset)
            }
        }
        const movescreen = setInterval(updatemoving, (1000/60));
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            scale = canvas.height/12;
            if (canvas.width-(scale*16)<=250) {
                scale = (canvas.width-250)/16;
            }
            draw();
        }
        window.addEventListener("resize", resize);

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            //chessboard green
            ctx.fillStyle = mintgreen;
            for (let y = 0; y < 16; y++) {
                for (let x = 0; x < 10; x++) {
                    if (y % 2 === 1) {
                        ctx.fillRect(x*(2*scale)-(scale*2)+(xoffset*scale), y*(1*scale)-(scale*2)+(yoffset*scale), (1*scale), (1*scale));
                    } else {
                        ctx.fillRect(x*(2*scale)+(xoffset*scale)-scale, y*(1*scale)-(scale*2)+(yoffset*scale), (1*scale), (1*scale));
                    }
                }
            }
            //chessboard white
            ctx.fillStyle = chesswhite;
            for (let y = 0; y < 16; y++) {
                for (let x = 0; x < 10; x++) {
                    if (y % 2 === 0) {
                        ctx.fillRect(x*(2*scale)-(scale*2)+(xoffset*scale), y*(1*scale)-(scale*2)+(yoffset*scale), (1*scale), (1*scale));
                    } else {
                        ctx.fillRect(x*(2*scale)+(xoffset*scale)-scale, y*(1*scale)-(scale*2)+(yoffset*scale), (1*scale), (1*scale));
                    }
                }
            }
            //bottom bar
            ctx.fillStyle = darkgreen;
            ctx.fillRect(0, scale*12, scale*16, (canvas.width-(scale*12)));
            //side bar
            ctx.fillStyle = forestgreen;
            ctx.fillRect(scale*16, 0, canvas.width-(scale*16),canvas.height)
            //king
            ctx.fillStyle = 
            ctx.drawRect(60, 60, 50, 50);
        }
        const resizeInterview = setInterval(draw, (1000/60));
        resize();
        draw();
    </script>
</body>
</html>
