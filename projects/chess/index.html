<html>

<head>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <canvas id="maincanvas" width="400" height="400"></canvas>

    <script>
        //elements
        const canvas = document.getElementById("maincanvas");
        const ctx = canvas.getContext("2d");
        //variables
        let scale = 30;
        //colors
        mintgreen = "#20B03B"
        forestgreen = "#209A35"
        chesswhite = "#F4F0DD"

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            scale = canvas.height/12;
            if (canvas.width-(scale*16)<=250) {
                scale = (canvas.width-250)/16;
            }
            draw();
        }
        window.addEventListener("resize", resize);

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            //chessboard green
            ctx.fillStyle = mintgreen;
            for (let y = 0; y < 12; y++) {
                for (let x = 0; x < 8; x++) {
                    if (y % 2 === 1) {
                        ctx.fillRect(x*(2*scale), y*(1*scale), (1*scale), (1*scale));
                    } else {
                        ctx.fillRect(x*(2*scale)+(1*scale), y*(1*scale), (1*scale), (1*scale));
                    }
                }
            }
            //chessboard white
            ctx.fillStyle = chesswhite;
            for (let y = 0; y < 12; y++) {
                for (let x = 0; x < 8; x++) {
                    if (y % 2 === 0) {
                        ctx.fillRect(x*(2*scale), y*(1*scale), (1*scale), (1*scale));
                    } else {
                        ctx.fillRect(x*(2*scale)+(1*scale), y*(1*scale), (1*scale), (1*scale));
                    }
                }
            }
            ctx.fillStyle = forestgreen;
            ctx.fillRect(scale*16, 0, canvas.width-(scale*16),canvas.height)
            draw();
        }
        const resizeInterview = setInterval(draw, (1000/60));

        resize();
        draw();
    </script>
</body>
</html>
